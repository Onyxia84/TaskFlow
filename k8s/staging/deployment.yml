apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-backend
  namespace: taskflow-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-backend
  template:
    metadata:
      labels:
        app: taskflow-backend
    spec:
      containers:
      - name: backend
        image: <PSEUDO_DOCKER_COLLEGUE>/taskflow-backend:latest # SON IMAGE
        ports:
        - containerPort: 3001 # Il utilise le port 3001 d'après son code
        envFrom:
        - configMapRef:
            name: taskflow-config
        - secretRef:
            name: taskflow-secrets
