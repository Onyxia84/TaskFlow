# 1. SERVICE REDIS (ClusterIP = Interne uniquement)
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: taskflow-staging
spec:
  type: ClusterIP
  selector:
    app: taskflow-redis
  ports:
    - port: 6379
      targetPort: 6379
---
# 2. SERVICE BACKEND (ClusterIP = Interne, seul le frontend ou l'ingress lui parle)
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: taskflow-staging
spec:
  type: ClusterIP 
  selector:
    app: taskflow-backend
  ports:
    - port: 3001
      targetPort: 3001
---
# 3. SERVICE FRONTEND (NodePort = Accessible de l'extérieur)
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: taskflow-staging
spec:
  type: NodePort
  selector:
    app: taskflow-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # Port à utiliser dans ton navigateur
