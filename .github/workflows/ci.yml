name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run lint
        run: npm run lint
        working-directory: backend

  audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Run audit
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: false
      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: backend/npm-audit.json

  build:
    runs-on: ubuntu-latest
    needs: [lint, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.ref_name }} ./backend
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.ref_name }}
          exit-code: '1'
          severity: 'CRITICAL'
          output: trivy-report.txt
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.txt
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.ref_name }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v3
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > $HOME/.kube/config
      - name: Deploy to staging
        run: |
          kubectl set image deployment/taskflow-backend \
            backend=${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.ref_name }} \
            -n staging
      - name: Smoke test
        run: |
          kubectl rollout status deployment/taskflow-backend -n staging
          kubectl port-forward svc/taskflow-backend 3001:3001 -n staging &
          sleep 5
          curl --fail http://localhost:3001/health

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" > $HOME/.kube/config
      - name: Deploy to production
        run: |
          kubectl set image deployment/taskflow-backend \
            backend=${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.ref_name }} \
            -n production